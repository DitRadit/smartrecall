<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#022448" />
    <title>SmartRecall</title>
    <link rel="manifest" href="/manifest.json" />
    <!--
      Be Vietnam Pro + Material Symbols dimuat dari Google Fonts (butuh internet
      sesaat saat load pertama). Setelah itu, browser cache font ini secara
      normal, dan fallback ke system font stack tetap terpasang di
      tailwind.config.js kalau font gagal dimuat -- UI tetap rapi walau
      offline total. Rekomendasi sebelum rilis: self-host font ini di
      /public/fonts agar tidak bergantung sama sekali pada koneksi ke Google
      (lihat catatan di ARCHITECTURE.md 7.1).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
