<!DOCTYPE html>

<html class="light" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SmartRecall - Masuk</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #f8f9ff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Subtle atmospheric drift for the background blobs */
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(20px, -30px) scale(1.1); }
            66% { transform: translate(-10px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .animate-float {
            animation: float 15s ease-in-out infinite;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-dim": "#cbdbf5",
                        "primary-fixed-dim": "#adc8f5",
                        "on-secondary-fixed": "#2a1700",
                        "inverse-primary": "#adc8f5",
                        "primary": "#022448",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#005236",
                        "secondary-fixed-dim": "#ffb95f",
                        "tertiary-container": "#00422b",
                        "surface-container-low": "#eff4ff",
                        "on-tertiary-container": "#10b981",
                        "primary-fixed": "#d5e3ff",
                        "error": "#ba1a1a",
                        "surface-container-high": "#dce9ff",
                        "on-primary-fixed": "#001c3b",
                        "on-secondary-fixed-variant": "#653e00",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#4edea3",
                        "tertiary-fixed": "#6ffbbe",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-variant": "#d3e4fe",
                        "on-primary-container": "#8aa4cf",
                        "on-surface-variant": "#43474e",
                        "on-secondary": "#ffffff",
                        "background": "#f8f9ff",
                        "surface-container": "#e5eeff",
                        "surface-bright": "#f8f9ff",
                        "surface-tint": "#455f87",
                        "primary-container": "#1e3a5f",
                        "on-background": "#0b1c30",
                        "surface-container-highest": "#d3e4fe",
                        "outline": "#74777f",
                        "on-error": "#ffffff",
                        "on-secondary-container": "#684000",
                        "secondary-container": "#fea619",
                        "surface": "#f8f9ff",
                        "on-error-container": "#93000a",
                        "secondary": "#855300",
                        "outline-variant": "#c4c6cf",
                        "inverse-surface": "#213145",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed": "#002113",
                        "on-primary-fixed-variant": "#2d486d",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#0b1c30",
                        "secondary-fixed": "#ffddb8",
                        "tertiary": "#002a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "touch-target-min": "48px",
                        "stack-sm": "12px",
                        "container-padding": "20px",
                        "gutter": "16px",
                        "base": "8px",
                        "stack-md": "24px",
                        "stack-lg": "40px"
                    },
                    "fontFamily": {
                        "label-md": ["Be Vietnam Pro"],
                        "label-sm": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-lg-mobile": ["Be Vietnam Pro"],
                        "headline-lg": ["Be Vietnam Pro"],
                        "headline-md": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "label-md": ["14px", {"lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "body-md": ["16px", {"lineHeight": "26px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "30px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="bg-background text-on-surface flex flex-col min-h-screen items-center justify-center relative overflow-hidden">
<!-- Subtle Background Atmosphere -->
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-surface-container rounded-full blur-[80px] animate-float opacity-60"></div>
<div class="absolute top-1/2 -right-32 w-80 h-80 bg-primary-fixed-dim rounded-full blur-[100px] animate-float opacity-30" style="animation-delay: -5s;"></div>
<div class="absolute bottom-10 left-1/4 w-64 h-64 bg-surface-container-high rounded-full blur-[60px] animate-float opacity-40" style="animation-delay: -2s;"></div>
</div>
<!-- Main Content Container -->
<main class="z-10 w-full max-w-[400px] px-container-padding flex flex-col items-center">
<!-- App Identity -->
<div class="mb-stack-lg text-center flex flex-col items-center">
<div class="w-20 h-20 bg-primary flex items-center justify-center rounded-[24px] mb-stack-sm shadow-sm">
<span class="material-symbols-outlined text-[48px] text-on-primary" data-icon="school" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tight">SmartRecall</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] leading-tight mt-1">
                Belajar Kapan Saja, Di Mana Saja <span class="text-secondary font-bold">(Tanpa Internet)</span>
</p>
</div>
<!-- Login Card -->
<div class="w-full bg-surface-container-lowest border border-outline-variant rounded-xl p-6 shadow-sm">
<form action="#" class="flex flex-col gap-base" onsubmit="event.preventDefault();">
<!-- Username Field -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface px-1" for="username">Nama Pengguna</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="person">person</span>
<input class="w-full h-touch-target-min pl-12 pr-4 border border-outline rounded-lg bg-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-body-md outline-none" id="username" placeholder="Masukkan nama pengguna" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-1 mt-2">
<label class="font-label-md text-label-md text-on-surface px-1" for="password">Kata Sandi</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-outline" data-icon="lock">lock</span>
<input class="w-full h-touch-target-min pl-12 pr-4 border border-outline rounded-lg bg-surface focus:border-primary focus:ring-1 focus:ring-primary transition-all font-body-md text-body-md outline-none" id="password" placeholder="Masukkan kata sandi" type="password"/>
<button class="absolute right-4 text-outline hover:text-primary transition-colors cursor-pointer" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined" data-icon="visibility" id="eye-icon">visibility</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="mt-stack-md flex flex-col gap-stack-sm">
<button class="w-full h-touch-target-min bg-primary text-on-primary font-label-md text-label-md rounded-full shadow-sm hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
                        Masuk
                        <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>
</button>
<div class="flex items-center justify-between px-2">
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Lupa Kata Sandi?</a>
<div class="h-1 w-1 bg-outline-variant rounded-full"></div>
<a class="font-label-sm text-label-sm text-primary hover:underline" href="#">Daftar Akun Baru</a>
</div>
</div>
</form>
</div>
<!-- Offline Status Footer -->
<div class="mt-stack-lg flex items-center gap-2 text-on-surface-variant bg-secondary-container/20 px-4 py-2 rounded-full border border-secondary-container/30">
<span class="material-symbols-outlined text-[18px] text-secondary" data-icon="wifi_off">wifi_off</span>
<span class="font-label-sm text-label-sm">Bekerja penuh secara offline</span>
</div>
<!-- Decorative Illustration -->
<div class="mt-stack-lg opacity-50 grayscale hover:grayscale-0 transition-all duration-700 max-w-[200px]">
<img class="w-full h-auto" data-alt="A minimalist and soft vector illustration of a student sitting under a tree reading a digital tablet in a rural landscape. The style is modern corporate minimalism with a palette of navy blue and soft amber. The lighting is bright and airy, suggesting a warm and supportive learning environment for remote education." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA0X9UPLShvaP6QszekLHFi0jfaUDrnDeAYVIkmEab801taLPG0Qc53EvyseOJ3fqpze_k4_UoziKNcJ9yYjvgyzM9mX1YiLf8hh-hmVxszL4t8wmm9eFGkvanxB1mY0cmzfarepa-N4Q-FGew596a8jMHqVlf3lcRqhBFVWJBbMjmJuoU1a9JiP37Pa7Y_-rQirNdaQWvvD0uEC-aK6Jq7801q1eO_k4eOaZmMM2SI3uSytjOyxJk"/>
</div>
</main>
<!-- Language Selector Floating -->
<div class="fixed top-4 right-4 z-20">
<button class="flex items-center gap-1 px-3 py-1 bg-surface-container border border-outline-variant rounded-full text-on-surface-variant hover:bg-surface-container-high transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="language">language</span>
<span class="font-label-sm text-label-sm">Bahasa Indonesia</span>
</button>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = 'visibility';
            }
        }

        // Lightweight interaction for the Masuk button
        document.querySelector('form').addEventListener('submit', function() {
            const btn = this.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="autorenew">autorenew</span> Memproses...';
            btn.disabled = true;
            setTimeout(() => {
                btn.innerHTML = 'Masuk <span class="material-symbols-outlined text-[20px]" data-icon="login">login</span>';
                btn.disabled = false;
                alert('Demo: Fitur login akan segera tersedia!');
            }, 1500);
        });
    </script>
</body></html>
